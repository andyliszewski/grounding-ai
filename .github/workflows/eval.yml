name: eval

on:
  pull_request:
    paths:
      - 'grounding/embedder.py'
      - 'grounding/vector_store.py'
      - 'grounding/chunker.py'
      - 'grounding/cli.py'
      - 'grounding/manifest.py'
      - 'grounding/agent_filter.py'
      - 'grounding/eval/**'
      - 'tests/eval_fixtures/**'
      - 'docs/eval/**'
      - 'pyproject.toml'
      - '.github/workflows/eval.yml'

permissions:
  pull-requests: write
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/torch/sentence_transformers
            ~/.cache/huggingface
          key: st-${{ runner.os }}-all-MiniLM-L6-v2-v1

      - name: Install grounding-ai
        run: pip install -e .

      - name: Cache mini FAISS index
        id: cache-mini-index
        uses: actions/cache@v4
        with:
          path: tests/eval_fixtures/mini_index
          key: mini-index-${{ runner.os }}-${{ hashFiles('tests/eval_fixtures/mini_corpus/**/*.md', 'tests/eval_fixtures/mini_corpus/_index.json', 'grounding/embedder.py', 'grounding/vector_store.py') }}

      - name: Build mini FAISS index
        if: steps.cache-mini-index.outputs.cache-hit != 'true'
        run: |
          grounding embeddings \
            --corpus tests/eval_fixtures/mini_corpus \
            --out tests/eval_fixtures/mini_index

      - name: Run eval gate
        id: eval
        run: |
          set +e
          mkdir -p eval-output
          grounding eval \
            --agent mini \
            --agents-dir tests/eval_fixtures/agents \
            --fixtures tests/eval_fixtures/mini_fixtures.yaml \
            --corpus tests/eval_fixtures/mini_corpus \
            --embeddings tests/eval_fixtures/mini_index \
            --baseline docs/eval/baselines/mini-corpus.json \
            --fail-under 0.05 \
            --out eval-output/ \
            | tee eval-output/stdout.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-output
          path: eval-output/
          if-no-files-found: warn

      - name: Post regression comment
        if: failure() && steps.eval.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'eval-output';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.md'));
            if (files.length === 0) {
              core.warning('no markdown report found in eval-output/');
              return;
            }
            files.sort();
            const report = fs.readFileSync(path.join(dir, files[files.length - 1]), 'utf8');
            const marker = '<!-- grounding-eval-comment -->';
            const body = `${marker}\n## Retrieval eval regression\n\nThe retrieval eval gate failed for this PR. Review the report below; if the deltas are intentional, refresh the baseline (see \`docs/eval/README.md\`).\n\n<details><summary>Eval report (click to expand)</summary>\n\n${report}\n\n</details>`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
