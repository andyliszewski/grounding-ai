status_reason: >-
  All 12 ACs met with clean test coverage (20 tests, 0.05s). BM25
  sidecar is purely additive — FAISS index format and existing tests
  untouched, verified. Parallel-array contract with FAISS is visibly
  preserved (mini-corpus fixture ordering matches FAISS _chunk_map
  position-for-position), which sets up 19.2's RRF merge to be a
  direct chunk_id dict lookup. Two non-obvious implementation
  decisions — empty-corpus `None` sentinel pickle and the
  `_grounding_tokenized_corpus` namespaced attribute on BM25Okapi —
  are correct and cleanly documented. No runtime paths (CLI/MCP/local_rag)
  are altered yet; the sidecar is write-only until 19.3 wires it in.
