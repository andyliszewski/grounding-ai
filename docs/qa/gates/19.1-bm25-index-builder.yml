nfr_validation:
  _assessed: [security, performance, reliability, maintainability]
  security:
    status: PASS
    notes: >-
      No network, no subprocess, no new secrets. pickle load/dump over
      a path in the user's own embeddings directory — same trust model
      as the pre-existing _embeddings.faiss. rank_bm25 is pure-Python
      numpy; no native extensions beyond what torch/faiss already
      introduce. No new surface area for external input.
  performance:
    status: PASS
    notes: >-
      Within this story's scope — writing/reading artifacts — the
      module is fast (20 tests in 0.05s; mini-corpus build is
      instantaneous). O(total) rebuild-on-append at incremental time
      is an explicit trade against vendoring rank_bm25, documented in
      Dev Notes, and acceptable at Day 1 (incremental batches are
      typically tens of chunks). No latency-sensitive path is wired
      yet — search isn't surfaced to CLI/MCP/local_rag until 19.3. A
      benchmark at ≥10k chunks is the right next step and is
      recommended for 19.4's scope.
  reliability:
    status: PASS
    notes: >-
      Atomic writes via temp-file-then-rename (bytes + JSON helpers
      local to bm25.py — correctly kept out of utils.py per dev-notes
      option 2). Loader returns None for absent files (soft failure);
      raises BM25FormatError with actionable rebuild hint for
      tokenizer-identity or format-version mismatch (hard failure,
      correct). Tombstone tracking is idempotent
      (test_tombstone_idempotent verifies). Empty-corpus sentinel
      distinguishes "index exists but empty" from "index absent", so
      downstream callers can't confuse the two.
  maintainability:
    status: PASS
    notes: >-
      Single-file module (~430 lines) with a docstring that explains
      the full contract (tokenizer identity, parallel-array
      invariant, tombstone semantics, why rebuild-on-append). Tests
      are readable and atomic. CLAUDE.md has a "BM25 Sidecar (Epic
      19.1)" sub-section that documents file names, schema, migration
      behavior, and parallel-array contract — exactly the minimum 19.2
      needs to pick up without re-reading the PR.

