  future:
    - action: "Remove module-level `importlib.reload(formatter_module)` from tests/test_formatter.py — it is unnecessary (the normal import already binds the module) and creates a test-isolation hazard: running `pytest tests/test_formatter_element_map.py tests/test_formatter.py` (element_map first on CLI) fails `test_multi_page_pdf_elements_populate_page_numbers` because the reload rebinds `FormatResult`, so `isinstance(result, FormatResult)` returns False even though the repr matches. Does NOT manifest in default alphabetical collection (test_formatter.py reloads before element_map imports), but exposes the new file to flakiness under explicit ordering, `-k` filters, or parallel runners."
      refs: ["tests/test_formatter.py:11-12", "tests/test_formatter_element_map.py:56-67"]
    - action: "Add a mixed-input smoke test (TextElement + unstructured stubs in the same batch) to lock in the per-element `_classify_element` dispatch contract. Current behavior is correct by construction but not explicitly asserted."
      refs: ["grounding/formatter.py:225-246", "tests/test_formatter_element_map.py"]
    - action: "Consider exposing `_compute_heading_stacks` as a named (module-private) utility for Story 17.2's chunker to reuse rather than re-deriving stacks from element records. Optional — depends on 17.2's design."
      refs: ["grounding/formatter.py:178-200"]
