nfr_validation:
  security:
    status: PASS
    notes: 'No new attack surface — hybrid path reuses same on-disk artifacts as dense path; YAML loaded via safe_load; CLI args validated through HybridConfig.validate(). MCP server reads kwargs directly from tool arguments (consistent with rerank scope fence).'
  performance:
    status: CONCERNS
    notes: 'Hybrid adds BM25 tokenization + ranking on top of dense; pool_k = max(hybrid.pool_size, rerank.pool_size, top_k) means hybrid+rerank fetches a wider pool than rerank alone. Story 19.3 itself does not measure the cost — by design, deferred to 19.4. The composition is correct; the open question is whether the latency budget holds. Off-by-default mitigates the risk for users who do not opt in.'
  reliability:
    status: PASS
    notes: 'Dense-only fallback when BM25 artifacts are missing (hybrid_degraded flag). Backward-compat invariant verified via 5 dedicated tests + the eval gate (worst_drop 0.000 against the pre-19.3 baseline). Invalid CLI values exit 2 with actionable stderr.'
  maintainability:
    status: CONCERNS
    notes: 'Resolver duplication and triple enrichment-loop duplication (MNT-001, MNT-002) are real maintenance taxes. Both are explicitly acknowledged in Dev Notes and bounded — neither blocks the story. Unified resolver should land before Epic 20 introduces a third config dimension.'

