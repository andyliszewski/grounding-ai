top_issues:
  - id: "MNT-001"
    severity: low
    title: "run_id is computed twice per eval_command invocation"
    location: "grounding/eval/cli.py:299,309"
    note: |
      `_make_run_id(args.agent)` is called once for the diff (cur_dict) and
      again for artifact paths. The diff only consumes `aggregate`, so the
      run_id embedded in cur_dict is never observed — but the duplicate call
      is confusing and creates a theoretical cross-second mismatch window.
      Suggested fix: compute `run_id` once at the top of the handler and
      reuse it.
    suggested_owner: dev

  - id: "REQ-001"
    severity: low
    title: "Explicit --fail-under 0.0 without --baseline silently skips warning"
    location: "grounding/eval/cli.py:271"
    note: |
      AC7: 'Without --baseline, --fail-under is ignored with a warning.'
      Current guard is `if args.fail_under and args.baseline is None:` which
      falsily skips the warning when the user explicitly passes
      `--fail-under 0.0` (the default value). Acceptable since the net
      behavior is the same (ignored), but the warning is spec'd
      unconditionally. Consider `args.fail_under is not None` or tracking
      whether the flag was explicitly provided via `default=argparse.SUPPRESS`.
    suggested_owner: dev

