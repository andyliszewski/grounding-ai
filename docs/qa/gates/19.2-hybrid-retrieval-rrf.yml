nfr_validation:
  _assessed: [security, performance, reliability, maintainability]
  security:
    status: PASS
    notes: >-
      No new external input surface. No network, no subprocess, no
      new dependencies. Pure in-process RRF merge over ids + ranks.
      Tombstone cross-check tightens an existing defense.
  performance:
    status: PASS
    notes: >-
      Up to 2×pool_size unique candidates enter an O(N log N) sort on
      N≤100. Sub-millisecond overhead on top of dense search, which
      remains the dominant cost and is unchanged. No latency-sensitive
      surface wired yet — 19.3 owns the first live measurement.
  reliability:
    status: PASS
    notes: >-
      Four explicit degraded paths, each now directly tested: (1)
      both channels empty → [], (2) BM25 artifacts missing →
      dense-only with WARNING + `hybrid_degraded=True`, including
      FAISS-tombstone filtering in that branch (new TEST-001
      regression), (3) empty query tokens → BM25 contributes [], no
      degradation marker (per AC #7), (4) cross-channel tombstone
      inconsistency → drop from both channels' merge, DEBUG-log once
      per call. Input validation at entry rejects `pool_size < 1`,
      `top_k < 1`, `k_rrf < 1` with informative ValueErrors.
  maintainability:
    status: PASS
    notes: >-
      Module is tighter after MNT-001 fix (~345 lines, one fewer
      helper). Docstring carries the fusion formula, worked example,
      dense-only fallback semantics, and full return-dict shape —
      19.3 can pick this up without re-reading the story. Tests are
      atomic, inject all three expensive callables, and run in
      ~4s for 11 cases.

